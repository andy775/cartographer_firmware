<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographer Firmware Flasher - Select Action</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 700px;
            width: 100%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 10px;
            font-size: 1.1em;
        }

        .probe-info {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 40px;
            font-size: 1.2em;
            text-transform: uppercase;
        }

        .action-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 40px;
        }

        .action-option {
            cursor: pointer;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            background: #f9f9f9;
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .action-option:hover {
            border-color: #667eea;
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
            background: #f0f4ff;
        }

        .action-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .action-name {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .action-description {
            color: #666;
            font-size: 1em;
            line-height: 1.5;
        }

        .action-warning {
            color: #dc3545;
            font-size: 0.9em;
            font-weight: 600;
            margin-top: 10px;
        }

        .back-btn {
            margin-top: 30px;
            text-align: center;
        }

        .back-link {
            color: #667eea;
            text-decoration: none;
            font-size: 1em;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: #764ba2;
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .action-selection {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 2em;
            }

            .container {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Select Action</h1>
        <p class="subtitle">What would you like to do?</p>
        <div class="probe-info">Selected: {{ probe_version.upper() }} Probe</div>
        
        <div class="action-selection">
            <a href="#" class="action-option" onclick="selectAction('update_firmware')">
                <div class="action-icon">⚡</div>
                <div class="action-name">Update Firmware</div>
                <div class="action-description">Flash the latest firmware to your probe</div>
            </a>
            
            <a href="#" class="action-option" onclick="selectAction('switch_protocols')">
                <div class="action-icon">🔄</div>
                <div class="action-name">Switch Protocols</div>
                <div class="action-description">Change between CAN and USB protocols</div>
            </a>
            
            <a href="#" class="action-option" onclick="selectAction('recover_probe')">
                <div class="action-icon">🔧</div>
                <div class="action-name">Recover Probe</div>
                <div class="action-description">Recover a probe that is not responding</div>
                <div class="action-warning">requires DFU</div>
            </a>
        </div>
        
        <div class="back-btn">
            <a href="{{ url_for('index') }}" class="back-link">← Back to probe selection</a>
        </div>
    </div>

    <script>
        function selectAction(action) {
            if (action === 'update_firmware') {
                window.location.href = "{{ url_for('update_firmware') }}";
            } else if (action === 'switch_protocols') {
                alert('Switch Protocols selected. This feature will be implemented next.');
            } else if (action === 'recover_probe') {
                alert('Recover Probe selected. This feature will be implemented next.');
            }
        }
    </script>
</body>
</html>
